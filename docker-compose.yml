services:
  douyin-webui:
    build: .
    container_name: douyin-webui
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      # 语音识别 API Key（二选一）
      - API_KEY=${API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
    restart: unless-stopped
